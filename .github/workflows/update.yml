name: Nuclei CVE 24/7 Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v2/cmd/nuclei@latest
          echo "✅ Nuclei installed"

      - name: Wayback JS Scan
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          if [ ! -s data/targets.list ]; then
            echo "No domains left to scan!"
            exit 0
          fi

          RAW_DOMAIN=$(head -n 1 data/targets.list)
          TARGET_DOMAIN=$(echo "$RAW_DOMAIN" | tr -d '\r' | xargs)

          # Remove processed domain
          sed -i '1d' data/targets.list

          if [ -z "$TARGET_DOMAIN" ]; then
            echo "Empty domain, skipping..."
            exit 0
          fi

          echo "=================================="
          echo "Scanning: $TARGET_DOMAIN"
          echo "=================================="

          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"🚀 Starting Wayback JS Scan: ${TARGET_DOMAIN}\"}" \
            "$DISCORD_WEBHOOK" || true

          # === Fetch Wayback Machine JS URLs ===
          echo "Fetching historical JS files from Wayback Machine..."
          wget -qO urls.txt "https://web.archive.org/cdx/search/cdx?url=*.${TARGET_DOMAIN}&matchType=domain&fl=original&collapse=urlkey&output=text&filter=statuscode:200" || true

          grep -E -i '\.js(\?|$)' urls.txt > q-urls.txt || true

          if [ -s q-urls.txt ]; then
            echo "Found $(wc -l < q-urls.txt) JavaScript files from archive"

            chmod +x script.sh || true

            echo "Running script.sh..."
            ./script.sh -f q-urls.txt || true

          else
            echo "No JavaScript files found in Wayback archive for ${TARGET_DOMAIN}"
          fi

          # Final notification
          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"✅ Completed Scan: ${TARGET_DOMAIN}\"}" \
            "$DISCORD_WEBHOOK" || true

          # Commit and push progress
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/targets.list

          if ! git diff --cached --quiet; then
            git commit -m "Completed Wayback JS scan for $TARGET_DOMAIN"
            git push origin main
            echo "✅ Progress saved"
          fi
