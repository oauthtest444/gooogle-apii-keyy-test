name: Nuclei CVE 24/7 Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}

      - name: Setup Go with Cache
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Cache Go Binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-binaries-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-binaries-

      - name: Install Tools
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          
          if ! command -v subfinder &> /dev/null; then
            echo "Installing Subfinder..."
            go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          fi
          
          if ! command -v nuclei &> /dev/null; then
            echo "Installing Nuclei..."
            go install -v github.com/projectdiscovery/nuclei/v2/cmd/nuclei@latest
          fi
          
          echo "✅ Tools ready"
      - name: Extract, Scan, and Loop
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          if [ ! -s data/targets.list ]; then
            echo "No domains left to scan!"
            exit 0
          fi

          RAW_DOMAIN=$(head -n 1 data/targets.list)
          TARGET_DOMAIN=$(echo "$RAW_DOMAIN" | tr -d '\r' | xargs)

          # Remove first domain immediately
          sed -i '1d' data/targets.list

          if [ -z "$TARGET_DOMAIN" ]; then
            echo "Domain empty."
            exit 0
          fi

          # === Wayback Machine JS URLs + Nuclei Scan ===
          echo "Fetching historical JS files from Wayback Machine..."
          wget -qO urls.txt "https://web.archive.org/cdx/search/cdx?url=${TARGET_DOMAIN}&matchType=domain&fl=original&collapse=urlkey&output=text&filter=statuscode:200" || true
          
          grep -E -i '\.js(\?|$)' urls.txt > q-urls.txt || true

          if [ -s q-urls.txt ]; then
            echo "Found $(wc -l < q-urls.txt) JavaScript files from archive"

            # Make script executable
            chmod +x script.sh || true

            echo "Running custom script.sh..."
            ./script.sh -f q-urls.txt || true

          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"✅ Completed Scan: ${TARGET_DOMAIN}\"}" \
            "$DISCORD_WEBHOOK" || true

          # === Commit and Push Progress ===
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/targets.list

          if ! git diff --cached --quiet; then
            git commit -m "Completed scan for $TARGET_DOMAIN"
            git push origin main
            echo "Pushed updates."
          fi
